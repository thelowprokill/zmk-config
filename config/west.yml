manifest:
  defaults:
    revision: v0.3
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    # Additional modules containing boards/shields/custom code can be listed here as well
    # See https://docs.zephyrproject.org/3.2.0/develop/west/manifest.html#projects
    #- name: george-norton
    #  url-base: https://github.com/george-norton
    - name: thelowprokill
      url-base: https://github.com/thelowprokill
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: zmk-driver-pmw3360
      remote: thelowprokill
    #  remote: george-norton
      revision: main
    #- name: pmw3389_zephyr_driver
    #  remote: thelowprokill
    #  revision: main
  self:
    path: config
