# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
CONFIG_I2C=y
CONFIG_ZMK_DISPLAY=y
#CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_LV_FONT_MONTSERRAT_8=y
#CONFIG_ZMK_DISPLAY_BLANK_TIMEOUT=600
#CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_IDLE_TIMEOUT=600000

CONFIG_I2C_NRFX_TRANSFER_TIMEOUT=200

CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y
CONFIG_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_SETTINGS_ZMS=y
CONFIG_ZMS=y
CONFIG_BT_SETTINGS=y
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=100
CONFIG_BT_DEVICE_NAME="nerdboard"
CONFIG_BT_MAX_CONN=7

CONFIG_ZMK_SPLIT=y

CONFIG_ZMK_MOUSE=y
CONFIG_SPI=y
#CONFIG_PMW3389=y
CONFIG_INPUT_PIXART_PMW3360=y
CONFIG_INPUT_PIXART_PMW3360_USE_OWN_THREAD=y

# --- Performance & Latency Tweaks ---

# 1. Force the keyboard's internal BLE stack to accept aggressive connection intervals
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9

# 2. Optimize the ZMK input scanning rate
# Reduces keypress latency to basically 1ms before processing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
# 15ms release debounce prevents false-releases on held mouse buttons during heavy physical use
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=15

# 3. Boost maximum Bluetooth transmission power (Helps prevent dropped mouse packets)
# For nRF52840 chips (like nice!nano), 8 is maximum power (+8 dBm)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# 4. Increase kscan event queue to absorb bursts of mouse button events during heavy use
# Default is 4; overflows during rapid button presses/releases and drops events (including releases)
CONFIG_ZMK_KSCAN_EVENT_QUEUE_SIZE=16


# --- Cleaned Configuration ---

# Increase the main system workqueue stack size to handle trackball math + key processing
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Set USB polling interval to 1ms (Highest performance for gaming)
CONFIG_USB_HID_POLL_INTERVAL_MS=1

# Bluetooth transmission buffers (always valid on nice_nano)
CONFIG_BT_BUF_ACL_TX_COUNT=32
CONFIG_BT_L2CAP_TX_BUF_COUNT=32
