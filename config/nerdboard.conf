# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
CONFIG_I2C=y
CONFIG_ZMK_DISPLAY=y
#CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_LV_FONT_MONTSERRAT_8=y
#CONFIG_ZMK_DISPLAY_BLANK_TIMEOUT=600
#CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_IDLE_TIMEOUT=600000

CONFIG_I2C_NRFX_TRANSFER_TIMEOUT=200

CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y
CONFIG_SETTINGS=y
CONFIG_BT_SETTINGS=y
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=100
CONFIG_BT_DEVICE_NAME="nerdboard"

CONFIG_ZMK_SPLIT=y

CONFIG_ZMK_MOUSE=y
CONFIG_SPI=y
#CONFIG_PMW3389=y
CONFIG_INPUT_PIXART_PMW3360=y
CONFIG_INPUT_PIXART_PMW3360_USE_OWN_THREAD=y

# --- Performance & Latency Tweaks ---

# 1. Force the keyboard's internal BLE stack to accept aggressive connection intervals
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9

# 2. Optimize the ZMK input scanning rate
# Reduces keypress latency to basically 1ms before processing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# 3. Boost maximum Bluetooth transmission power (Helps prevent dropped mouse packets)
# For nRF52840 chips (like nice!nano), 8 is maximum power (+8 dBm)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
